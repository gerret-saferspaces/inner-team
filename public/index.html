<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mein inneres Team</title>
    <meta
      name="description"
      content="Erkenne deine inneren Anteile, verstehe wer du bist und bring dein inneres Team zusammen."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">◍</span>
        <div>
          <h1>Mein inneres Team</h1>
          <p class="tagline">Anteile erkennen · verstehen · zusammenbringen</p>
        </div>
      </div>
      <nav class="tabs" id="tabs">
        <button class="tab is-active" data-view="team">Mein Team</button>
        <button class="tab" data-view="conference">Innere Konferenz</button>
        <button class="tab" data-view="insights">Erkenntnisse</button>
      </nav>
      <div class="topbar-actions">
        <button class="btn btn-ghost" id="exportBtn" title="Daten als Datei sichern">Export</button>
        <button class="btn btn-ghost" id="importBtn" title="Daten aus Datei laden">Import</button>
        <input type="file" id="importFile" accept="application/json" hidden />
      </div>
    </header>

    <main id="app">
      <!-- Views are rendered here by app.js -->
    </main>

    <!-- Modal host for editing parts -->
    <div class="modal-backdrop" id="modal" hidden>
      <div class="modal" role="dialog" aria-modal="true"></div>
    </div>

    <footer class="footer">
      <span>Alle Daten bleiben lokal in deinem Browser.</span>
    </footer>

    <script type="module" src="/app.js"></script>
  </body>
</html>
